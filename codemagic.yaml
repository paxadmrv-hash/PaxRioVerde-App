workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
        TEAM_ID: "264TWUW2L6"
        PROV_NAME: "Pax_Rio_Verde_Final"
        PROV_UUID: "f83a914d-202a-436e-9e51-257ae86fccd0"
    scripts:
      - name: Initialize Keychain
        script: |
          # Inicializa o chaveiro do Codemagic para armazenar o certificado P12
          keychain initialize
          # Define um tempo limite maior para o chaveiro não bloquear durante o build
          security set-keychain-settings -lut 3600 build.keychain

      - name: Install Credentials
        script: |
          # 1. Instala o Certificado P12 (Contém sua chave privada)
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"
          
          # 2. Instala o Perfil de Provisionamento na pasta correta do macOS
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE" | tr -d '\r\n ' | base64 --decode > "$PROFILES_DIR/$PROV_UUID.mobileprovision"
          
          # 3. Força o projeto a usar Assinatura Manual (Evita o erro 65)
          sed -i '' "s/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g" "$XCODE_PROJECT/project.pbxproj"
          
          echo "Certificado e Perfil instalados com sucesso no servidor."

      - name: Create Export Options
        script: |
          # Gera o arquivo necessário para a exportação final do IPA
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$APP_ID</key>
                  <string>$PROV_NAME</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build and Sign IPA
        script: |
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          # Executa o Archive forçando a identidade "Apple Distribution" e o UUID do perfil
          xcodebuild clean archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -destination 'generic/platform=iOS' \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROV_UUID" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--keychain /Users/builder/Library/Keychains/build.keychain-db"

          # Exporta o arquivo IPA final para upload
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "/Users/builder/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa