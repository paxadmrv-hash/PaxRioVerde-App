workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew

      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Manual Certificate
        script: |
          # Limpeza total do Base64 vindo do Windows
          echo "$CERTIFICATE_P12" | tr -dc 'A-Za-z0-9+/=' | base64 --decode > /tmp/certificate.p12
          
          # Importa o certificado que você gerou no seu PC
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"

      - name: Fetch Provisioning Profiles
        script: |
          # Comando simplificado: foca em buscar o perfil de desenvolvimento
          # sem tentar gerenciar certificados automaticamente
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_DEVELOPMENT \
            --create

      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug

      - name: Build iOS App
        script: |
          # O segredo: forçamos o Xcode a usar o certificado que instalamos manualmente
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com