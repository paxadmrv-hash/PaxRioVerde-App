workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final Build
    instance_type: mac_mini_m2

    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        TEAM_ID: "264TWUW2L6"
        APP_ID: "br.com.paxrioverde.app"
        PROV_UUID: "f83a914d-202a-436e-9e51-257ae86fccd0"

    scripts:
      - name: Initialize Keychain
        script: |
          keychain initialize
          keychain use-login

      - name: Install Certificate
        script: |
          echo "$CERTIFICATE_P12" | base64 --decode > cert.p12

          security import cert.p12 \
            -k ~/Library/Keychains/login.keychain-db \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "" \
            ~/Library/Keychains/login.keychain-db

          echo "🔍 Certificados:"
          security find-identity -v -p codesigning

      - name: Install Provisioning Profile
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          echo "$PROVISIONING_PROFILE" | base64 --decode > \
          ~/Library/MobileDevice/Provisioning\ Profiles/$PROV_UUID.mobileprovision

      - name: Build Archive (MANUAL SIGNING)
        script: |
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/app.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROV_UUID"

      - name: Export IPA (MANUAL SIGNING)
        script: |
          cat > export.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>

              <key>signingStyle</key>
              <string>manual</string>

              <key>teamID</key>
              <string>$TEAM_ID</string>

              <key>signingCertificate</key>
              <string>Apple Distribution</string>

              <key>provisioningProfiles</key>
              <dict>
                  <key>$APP_ID</key>
                  <string>$PROV_UUID</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/ios/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist export.plist

    artifacts:
      - build/ios/ipa/*.ipa