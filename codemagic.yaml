workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        TEAM_ID: "264TWUW2L6"

    scripts:
      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Certificate
        script: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12

          keychain add-certificates \
            --certificate /tmp/certificate.p12 \
            --certificate-password "$CERTIFICATE_PASSWORD"

          echo "🔍 Certificados disponíveis:"
          security find-identity -v -p codesigning

      - name: Create Export Options
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>

              <key>teamID</key>
              <string>$TEAM_ID</string>

              <key>signingStyle</key>
              <string>automatic</string>

              <key>stripSwiftSymbols</key>
              <true/>

              <key>compileBitcode</key>
              <false/>

              <key>manageAppVersionAndBuildNumber</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail

          echo "🧹 Limpando ambiente..."
          chmod +x gradlew
          ./gradlew clean
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

          echo "🧹 Limpando COMPLETAMENTE o signing do projeto..."

          # Remove qualquer configuração manual de provisioning
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$XCODE_PROJECT/project.pbxproj"
          sed -i '' 's/PROVISIONING_PROFILE = .*/PROVISIONING_PROFILE = "";/g' "$XCODE_PROJECT/project.pbxproj"

          # Remove QUALQUER identidade de assinatura
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/g' "$XCODE_PROJECT/project.pbxproj"

          # Força assinatura automática
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' "$XCODE_PROJECT/project.pbxproj"

          echo "🚀 Iniciando Archive..."

          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE="Automatic" \
            -allowProvisioningUpdates

          echo "📦 Exportando IPA..."

          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "/Users/builder/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive