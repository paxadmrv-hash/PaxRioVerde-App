workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew

      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Manual Certificate
        script: |
          # Limpa e decodifica o P12 da Natalia
          echo "$CERTIFICATE_P12" | tr -dc 'A-Za-z0-9+/=' | base64 --decode > /tmp/certificate.p12
          
          # Instala no Mac forçando a vinculação da chave privada
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"

      - name: Fetch Provisioning Profiles
        script: |
          # AQUI ESTÁ O PULO DO GATO:
          # --no-fetch-certificates: Impede o Codemagic de tentar baixar certificados da Apple.
          # Ele será obrigado a usar o que instalamos no passo anterior.
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_DEVELOPMENT \
            --no-fetch-certificates \
            --create

      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug

      - name: Build iOS App
        script: |
          # Forçamos o Xcode a usar o certificado que está no Keychain
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com