workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
        TEAM_ID: "264TWUW2L6"
        PROV_UUID: "f83a914d-202a-436e-9e51-257ae86fccd0"
    scripts:
      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Credentials
        script: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"
          
          # Garante que usaremos o nome padrão para distribuição Apple
          echo "CERT_NAME=Apple Distribution" >> $CM_ENV
          
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE" | tr -d '\r\n ' | base64 --decode > "$PROFILES_DIR/$PROV_UUID.mobileprovision"

      - name: Create Export Options
        script: |
          # Usando 'app-store-connect' como sugerido pelo Xcode 16
          # E forçando o signingCertificate dentro do Plist
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$APP_ID</key>
                  <string>$PROV_UUID</string>
              </dict>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail
          
          echo "🧹 Limpando configurações residuais..."
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' "$XCODE_PROJECT/project.pbxproj"
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = ".*";/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$XCODE_PROJECT/project.pbxproj"
          find . -name "*.xcconfig" -exec sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = /g' {} +

          chmod +x gradlew
          ./gradlew clean
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          echo "🚀 Executando Archive..."
          xcodebuild clean archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROV_UUID" \
            -allowProvisioningOffline=YES

          echo "📦 Exportando IPA (ExportArchive)..."
          # Adicionamos CODE_SIGN_IDENTITY aqui também para reforçar o override
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "/Users/builder/export_options.plist" \
            CODE_SIGN_IDENTITY="Apple Distribution"

    artifacts:
      - build/ios/ipa/*.ipa