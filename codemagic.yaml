workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew
      - name: Initialize Keychain & Fetch Signing
        script: |
          keychain initialize
          # Bundle ID atualizado para br.com.paxrioverde.app conforme build.gradle.kts
          app-store-connect fetch-signing-files "br.com.paxrioverde.app" --type IOS_APP_DEVELOPMENT --create
          keychain add-certificates
      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com
