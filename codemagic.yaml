scripts:
  - name: Build and Sign IPA
    script: |
      #!/usr/bin/env bash
      set -e # Para o script se qualquer comando falhar

      echo "🧹 Iniciando limpeza profunda do ambiente..."
      
      # 1. PREPARAÇÃO DE PASTAS
      mkdir -p build/ios/xcarchive
      mkdir -p build/ios/ipa

      # 2. SANEAMENTO RADICAL (Remove travas de nomes antigos)
      # Deleta linhas de CODE_SIGN_IDENTITY e PROVISIONING_PROFILE em arquivos do projeto e configs
      echo "🛠️ Removendo referências fixas de assinatura..."
      find . -type f \( -name "*.pbxproj" -o -name "*.xcconfig" -o -name "*.plist" \) -exec sed -i '' '/CODE_SIGN_IDENTITY/d' {} +
      find . -type f \( -name "*.pbxproj" -o -name "*.xcconfig" -o -name "*.plist" \) -exec sed -i '' '/PROVISIONING_PROFILE/d' {} +
      
      # Força o Estilo Manual e o Team ID correto em todo o projeto
      find . -name "project.pbxproj" -exec sed -i '' "s/ProvisioningStyle = [a-zA-Z]*;/ProvisioningStyle = Manual;/g" {} +
      find . -name "project.pbxproj" -exec sed -i '' "s/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = $TEAM_ID;/g" {} +

      # 3. LIMPEZA DE CACHE DO XCODE
      echo "🧹 Limpando caches do Xcode..."
      rm -rf ~/Library/Developer/Xcode/DerivedData/*
      
      # 4. EXECUÇÃO DO ARCHIVE (O segredo está em não usar aspas complexas aqui)
      echo "🚀 Iniciando xcodebuild archive..."
      xcodebuild clean archive \
        -project "$XCODE_PROJECT" \
        -scheme "$XCODE_SCHEME" \
        -configuration Release \
        -archivePath build/ios/xcarchive/app.xcarchive \
        -destination 'generic/platform=iOS' \
        CODE_SIGN_STYLE=Manual \
        DEVELOPMENT_TEAM=$TEAM_ID \
        CODE_SIGN_IDENTITY="Apple Distribution" \
        PROVISIONING_PROFILE_SPECIFIER=$PROV_UUID \
        PRODUCT_BUNDLE_IDENTIFIER=$APP_ID \
        AD_HOC_CODE_SIGNING_ALLOWED=YES \
        -allowProvisioningOffline=YES

      # 5. EXPORTAÇÃO DO IPA
      echo "📦 Exportando arquivo IPA final..."
      xcodebuild -exportArchive \
        -archivePath build/ios/xcarchive/app.xcarchive \
        -exportPath build/ios/ipa \
        -exportOptionsPlist "/Users/builder/export_options.plist"
    artifacts:
      - build/ios/ipa/*.ipa