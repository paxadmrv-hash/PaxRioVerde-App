workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
        TEAM_ID: "264TWUW2L6"
        PROV_UUID: "f83a914d-202a-436e-9e51-257ae86fccd0"

    scripts:
      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Certificates & Profiles
        script: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12

          keychain add-certificates \
            --certificate /tmp/certificate.p12 \
            --certificate-password "$CERTIFICATE_PASSWORD"

          echo "🔍 Certificados disponíveis:"
          security find-identity -v -p codesigning

          # Forçando padrão novo da Apple
          echo "CERT_NAME=Apple Distribution" >> $CM_ENV

          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          echo "$PROVISIONING_PROFILE" | tr -d '\r\n ' | base64 --decode > "$PROFILES_DIR/$PROV_UUID.mobileprovision"

      - name: Create Export Options
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>

              <key>teamID</key>
              <string>$TEAM_ID</string>

              <key>signingStyle</key>
              <string>automatic</string>

              <key>manageAppVersionAndBuildNumber</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail

          echo "🧹 Limpando projeto..."
          chmod +x gradlew
          ./gradlew clean
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          echo "🚀 Iniciando Archive..."
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE="Automatic" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            -allowProvisioningUpdates

          echo "📦 Exportando IPA..."
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "/Users/builder/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive