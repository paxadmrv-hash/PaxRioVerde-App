workflows:
  ios-workflow:
    name: Pax Rio Verde iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde" # O Codemagic vai buscar as chaves aqui
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew

      - name: Initialize Keychain
        script: keychain initialize

      - name: Fetch signing files from Apple
        script: |
          # Este comando usa as variáveis do seu grupo para baixar os certificados
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create

      - name: Install certificates
        script: keychain add-certificates

      - name: Build iOS App for Store
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        # Aqui fornecemos as chaves manualmente para não depender da integração do painel
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER

      email:
        recipients:
          - paxadmrv@gmail.com