name: iOS Build Pax Rio Verde

on:
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        env:
          P12_CERTIFICATE: ${{ secrets.P12_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decodifica o certificado P12
          printf '%s' "$P12_CERTIFICATE" | base64 --decode > certificate.p12
          
          # Configura o Keychain do macOS
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          
          # Importa o certificado
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Decrypt and Install Provisioning Profile
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # Caminho exato onde o arquivo foi subido
          GPG_FILE="iosApp/Pax_Rio_Verde.mobileprovision.gpg"
          
          if [ ! -f "$GPG_FILE" ]; then
            echo "ERRO: O arquivo criptografado não foi encontrado em $GPG_FILE"
            ls -R
            exit 1
          fi

          # 1. Tenta descriptografar
          gpg --quiet --batch --yes --decrypt --passphrase "$GPG_PASSPHRASE" \
          --output temp.mobileprovision "$GPG_FILE"

          # 2. Verifica se o arquivo descriptografado tem conteúdo
          if [ ! -s temp.mobileprovision ]; then
            echo "ERRO: O arquivo descriptografado está vazio. Verifique se a senha GPG_PASSPHRASE está correta."
            exit 1
          fi

          # 3. Tenta extrair o UUID (Necessário para o Xcode)
          UUID=$(security cms -D -i temp.mobileprovision | grep -aA1 "UUID" | grep -o "[-A-Z0-9]\{36\}" || echo "FALHA")

          if [ "$UUID" == "FALHA" ]; then
            echo "ERRO: O arquivo descriptografado não é um perfil válido da Apple."
            echo "Abaixo estão os primeiros bytes do arquivo para diagnóstico (se aparecerem caracteres estranhos, o arquivo original está corrompido):"
            head -c 200 temp.mobileprovision
            exit 1
          fi

          # 4. Instala o perfil no local correto
          cp temp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROVISIONING_PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Sucesso! UUID detectado: $UUID"

      - name: Build iOS Archive
        run: |
          # Build usando o projeto localizado na pasta iosApp
          xcodebuild -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphoneos \
            -configuration Release \
            archive -archivePath $PWD/build/PaxRioVerde.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER=${{ env.PROVISIONING_PROFILE_UUID }} \
            ALLOW_PROVISIONING_DEVICE_REGISTRATION=NO \
            ALLOW_PROVISIONING_UPDATES=NO

      - name: Export IPA
        run: |
          # Gera o arquivo de configuração para exportação via App Store
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>264TWUW2L6</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>br.com.paxrioverde.app</key> 
                  <string>${{ env.PROVISIONING_PROFILE_UUID }}</string>
              </dict>
          </dict>
          </plist>' > ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $PWD/build/PaxRioVerde.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build/ipa

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-output
          path: build/ipa/*.ipa
