workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"

    scripts:
      - name: Initialize Keychain
        script: keychain initialize

      - name: Fetch Signing Files
        script: |
          # Este comando agora vai usar as variáveis CERTIFICATE_P12 e PROVISIONING_PROFILE
          # que você subiu na interface do Codemagic.
          app-store-connect fetch-signing-files --type IOS_APP_STORE
          
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail
          
          chmod +x gradlew
          ./gradlew clean
          
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          xcode-project build-ipa \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archive-path build/ios/xcarchive/app.xcarchive \
            -ipa-path build/ios/ipa/PaxRioVerde.ipa \
            -configuration Release

    artifacts:
      - build/ios/ipa/*.ipa