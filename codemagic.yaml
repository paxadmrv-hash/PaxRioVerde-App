workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew
      - name: Initialize Keychain & Fetch Signing
        script: |
          keychain initialize
          
          # 1. Força a criação do arquivo físico da chave para garantir a leitura
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ./private_key.p8
          
          # 2. Busca e cria os arquivos usando o arquivo físico como referência
          app-store-connect fetch-signing-files "br.com.paxrioverde.app" \
            --type IOS_APP_DEVELOPMENT \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key ./private_key.p8
          
          keychain add-certificates
      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com