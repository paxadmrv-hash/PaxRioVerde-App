workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final (Automated)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
        CERTIFICATE_PASSWORD: "pax_rioverde_pro"

    scripts:
      - name: Initialize Keychain
        script: |
          keychain initialize
          keychain make-default

      - name: Fetch Signing Files (Force Creation)
        script: |
          # 1. Criamos pastas temporárias com permissão total
          mkdir -p /tmp/certs
          mkdir -p /tmp/profiles
          
          # 2. Comando ajustado: 
          # --certificate-key: Passamos um caminho para ele SALVAR a nova chave privada gerada
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --certificate-key /tmp/certs/new_service.key \
            --p12-password "$CERTIFICATE_PASSWORD" \
            --certificates-dir /tmp/certs \
            --profiles-dir /tmp/profiles
          
          # 3. Importação apontando para a pasta onde forçamos o download
          keychain add-certificates --certificates-dir /tmp/certs

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles --profiles-dir /tmp/profiles

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail
          
          chmod +x gradlew
          ./gradlew clean
          
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          xcode-project build-ipa \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archive-path build/ios/xcarchive/app.xcarchive \
            -ipa-path build/ios/ipa/PaxRioVerde.ipa \
            -configuration Release

    artifacts:
      - build/ios/ipa/*.ipa