workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final (Automated)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"

    scripts:
      - name: Initialize Keychain
        script: |
          keychain initialize
          keychain make-default

      - name: Fetch Signing Files (App Store Connect)
        script: |
          # O segredo da automação:
          # 1. Usamos as variáveis de API (Issuer ID, Key ID, Private Key) que você salvou.
          # 2. A flag --create permite que o Codemagic crie o certificado se não achar um válido com chave.
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create
          
          # Garante que o certificado criado seja instalado no chaveiro do build
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail
          
          echo "🧹 Limpando ambiente..."
          chmod +x gradlew
          ./gradlew clean
          
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          echo "🚀 Compilando e Assinando automaticamente..."
          xcode-project build-ipa \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archive-path build/ios/xcarchive/app.xcarchive \
            -ipa-path build/ios/ipa/PaxRioVerde.ipa \
            -configuration Release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive