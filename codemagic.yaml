workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
        TEAM_ID: "264TWUW2L6"
        PROV_NAME: "Pax_Rio_Verde_Final"
        PROV_UUID: "f83a914d-202a-436e-9e51-257ae86fccd0"
    scripts:
      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Credentials
        script: |
          # 1. Instala o Certificado P12
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"
          
          # 2. Instala o Perfil de Provisionamento
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE" | tr -d '\r\n ' | base64 --decode > "$PROFILES_DIR/$PROV_UUID.mobileprovision"

      - name: Create Export Options
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$APP_ID</key>
                  <string>$PROV_UUID</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          
          # 1. CRIAR O ARQUIVO DE OVERRIDE MESTRE (.xcconfig)
          # Sintaxe corrigida para o Xcode 16 (sem aspas nos seletores)
          echo "🛠️ Criando configuração mestre de assinatura..."
          cat > /Users/builder/force_signing.xcconfig <<EOF
          CODE_SIGN_IDENTITY = Apple Distribution
          CODE_SIGN_IDENTITY[sdk=iphoneos*] = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = $PROV_UUID
          DEVELOPMENT_TEAM = $TEAM_ID
          CODE_SIGN_STYLE = Manual
          EOF

          # 2. FORÇAR VARIÁVEIS NO AMBIENTE (Global Override para o Kotlin)
          export CODE_SIGN_IDENTITY="Apple Distribution"
          export DEVELOPMENT_TEAM="$TEAM_ID"
          export PROVISIONING_PROFILE_SPECIFIER="$PROV_UUID"

          # 3. LIMPEZA DE CACHE
          echo "🧹 Limpando resíduos antigos..."
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          # 4. ARCHIVE USANDO O XCCONFIG MESTRE
          echo "🚀 Iniciando xcodebuild archive..."
          xcodebuild clean archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -destination 'generic/platform=iOS' \
            -xcconfig /Users/builder/force_signing.xcconfig \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_ID" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -allowProvisioningOffline=YES

          # 5. EXPORTAR IPA
          echo "📦 Gerando o arquivo IPA final..."
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "/Users/builder/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa