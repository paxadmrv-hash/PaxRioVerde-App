workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final (Automated Signing)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde" # Certifique-se de que APP_ID e TEAM_ID estão aqui
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        TEAM_ID: "264TWUW2L6"
        APP_ID: "br.com.paxrioverde.app"

    scripts:
      - name: Initialize Keychain
        script: keychain initialize

      - name: Fetch Signing Files (App Store Connect)
        script: |
          # Este comando substitui toda aquela instalação manual de P12.
          # Ele baixa o certificado e o Profile direto da Apple usando a API que você configurou.
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create
          
          # Importa os certificados baixados para o keychain do Codemagic
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail

          echo "🧹 Limpando ambiente e compilando Kotlin..."
          chmod +x gradlew
          ./gradlew clean
          
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          echo "🚀 Gerando Archive e Exportando IPA..."
          # O comando 'build-ipa' do Codemagic é um wrapper que resolve 
          # automaticamente os problemas de export_options e identidades.
          xcode-project build-ipa \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archive-path build/ios/xcarchive/app.xcarchive \
            -ipa-path build/ios/ipa/PaxRioVerde.ipa \
            -configuration Release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive