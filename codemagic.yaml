workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew

      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Manual Certificate and Profile
        script: |
          # 1. Instalar Certificado P12
          echo "$CERTIFICATE_P12" | tr -dc 'A-Za-z0-9+/=' | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"

          # 2. Instalar o NOVO Perfil (UUID extraído do arquivo Pax_Rio_Verde_NOVO)
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$PROVISIONING_PROFILE" | tr -dc 'A-Za-z0-9+/=' | base64 --decode > "$PROFILES_HOME/4de931fb-f6d3-4574-a84e-d24babf20556.mobileprovision"

      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug

      - name: Build iOS App
        script: |
          # 3. Criar Export Options com o Novo UUID (4de931fb...)
          cat <<EOF > /Users/builder/export_options.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>264TWUW2L6</string>
              <key>compileBitcode</key>
              <false/>
              <key>provisioningProfiles</key>
              <dict>
                  <key>br.com.paxrioverde.app</key>
                  <string>4de931fb-f6d3-4574-a84e-d24babf20556</string>
              </dict>
          </dict>
          </plist>
          EOF

          # 4. Arquivar o Projeto forçando o NOVO Perfil e Bundle ID
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/ios/xcarchive/pax.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=264TWUW2L6 \
            PRODUCT_BUNDLE_IDENTIFIER="br.com.paxrioverde.app" \
            PROVISIONING_PROFILE_SPECIFIER="4de931fb-f6d3-4574-a84e-d24babf20556" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 5. Exportar o IPA final
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/pax.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com