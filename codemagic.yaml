workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final (Automated)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
        # Defina uma senha qualquer para o certificado temporário
        P12_PASSWORD: "pax_rioverde_automação"

    scripts:
      - name: Initialize Keychain
        script: |
          keychain initialize
          keychain make-default

      - name: Fetch Signing Files (App Store Connect)
        script: |
          # Adicionamos a flag --p12-password para que o Codemagic 
          # consiga criar o arquivo de chave privada localmente
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --p12-password "$P12_PASSWORD"
          
          # Informamos ao keychain para usar a mesma senha ao importar
          keychain add-certificates --p12-password "$P12_PASSWORD"

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail
          
          chmod +x gradlew
          ./gradlew clean
          
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          xcode-project build-ipa \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archive-path build/ios/xcarchive/app.xcarchive \
            -ipa-path build/ios/ipa/PaxRioVerde.ipa \
            -configuration Release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive