workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew

      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Manual Certificate and Profile
        script: |
          # 1. Install Certificate
          echo "$CERTIFICATE_P12" | tr -dc 'A-Za-z0-9+/=' | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"

          # 2. Install Profile using the exact UUID from your file
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$PROVISIONING_PROFILE" | tr -dc 'A-Za-z0-9+/=' | base64 --decode > "$PROFILES_HOME/da5556db-7d84-4644-8e18-2adc18c21df2.mobileprovision"

      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug

      - name: Build iOS App
        script: |
          # 3. Create Export Options
          cat <<EOF > /Users/builder/export_options.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>264TWUW2L6</string>
              <key>compileBitcode</key>
              <false/>
              <key>provisioningProfiles</key>
              <dict>
                  <key>br.com.paxrioverde.app</key>
                  <string>da5556db-7d84-4644-8e18-2adc18c21df2</string>
              </dict>
          </dict>
          </plist>
          EOF

          # 4. Build IPA forcing the profile UUID directly
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/ios/xcarchive/pax.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=264TWUW2L6 \
            PROVISIONING_PROFILE_SPECIFIER="da5556db-7d84-4644-8e18-2adc18c21df2" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # 5. Export the IPA
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/pax.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/ios/ipa

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com