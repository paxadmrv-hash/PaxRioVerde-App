workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew
      - name: Initialize Keychain & Fetch Signing
        script: |
          keychain initialize
          
          # TESTE 1: Formatação da Chave
          echo "=== QUANTAS LINHAS TEM A SUA CHAVE? ==="
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | wc -l
          echo "(Se o número acima for 1, a chave perdeu as quebras de linha e o build sempre vai falhar!)"
          echo "======================================="
          
          # TESTE 2: O Fantasma da Apple
          echo "=== CERTIFICADOS QUE O CODEMAGIC ESTÁ VENDO NA APPLE ==="
          app-store-connect certificates list
          echo "========================================================"

          # LIMPEZA E BUSCA
          app-store-connect fetch-signing-files "br.com.paxrioverde.app" \
            --type IOS_APP_DEVELOPMENT \
            --create
          
          keychain add-certificates
      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com