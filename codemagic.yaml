workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew
      - name: Initialize Keychain & Fetch Signing
        script: |
          keychain initialize
          
          # DIAGNÓSTICO (Isso vai aparecer no seu log)
          echo "=== DIAGNÓSTICO DE VARIÁVEIS ==="
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then 
            echo "ERRO CRÍTICO: A variável PRIVATE_KEY está VAZIA ou o Grupo 'Pax Rio Verde' não foi carregado."; 
          else 
            echo "OK: A variável PRIVATE_KEY foi detectada."; 
            # Verifica se o formato básico do arquivo .p8 está correto
            echo "$APP_STORE_CONNECT_PRIVATE_KEY" | grep -q "BEGIN PRIVATE KEY" && echo "OK: Formato da chave parece válido." || echo "ERRO: Texto da chave está incompleto ou sem cabeçalho."
          fi
          echo "================================"

          # LIMPEZA E BUSCA
          app-store-connect fetch-signing-files "br.com.paxrioverde.app" \
            --type IOS_APP_DEVELOPMENT \
            --create
          
          keychain add-certificates
      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com