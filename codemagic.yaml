workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
        TEAM_ID: "264TWUW2L6"
        PROV_NAME: "Pax_Rio_Verde_Final"
        PROV_UUID: "f83a914d-202a-436e-9e51-257ae86fccd0"
    scripts:
      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Credentials
        script: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"
          
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE" | tr -d '\r\n ' | base64 --decode > "$PROFILES_DIR/$PROV_UUID.mobileprovision"

      - name: Create Export Options
        script: |
          # Ajuste no method e adição do signingCertificate para evitar erro 70
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$APP_ID</key>
                  <string>$PROV_UUID</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail
          
          echo "🛠️ Preparando ambiente e limpando referências..."
          
          chmod +x gradlew
          
          # Limpeza de identidades no projeto para não confundir o exportador
          find . -type f -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' {} +
          find . -type f -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY\[sdk=iphoneos\*\] = ".*";/CODE_SIGN_IDENTITY[sdk=iphoneos*] = "";/g' {} +

          ./gradlew clean
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa
          mkdir -p build/ios/logs

          echo "🚀 Executando xcodebuild archive..."
          xcodebuild clean archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -destination 'generic/platform=iOS' \
            -resultBundlePath build/ios/logs/PaxBuildLogs.xcresult \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROV_UUID" \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -allowProvisioningOffline=YES | tee build/ios/logs/xcodebuild_raw_log.txt

          echo "📦 Gerando arquivo IPA final..."
          # Forçamos a identidade Apple Distribution aqui para casar com o que o Xcode 16+ espera
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "/Users/builder/export_options.plist" \
            CODE_SIGN_IDENTITY="Apple Distribution"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/logs/xcodebuild_raw_log.txt
      - build/ios/logs/PaxBuildLogs.xcresult