workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
        TEAM_ID: "264TWUW2L6"
        PROV_NAME: "Pax_Rio_Verde_Final"
        PROV_UUID: "f83a914d-202a-436e-9e51-257ae86fccd0"
    scripts:
      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Credentials
        script: |
          # 1. Instala o Certificado P12
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"
          
          # 2. Instala o Perfil de Provisionamento
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE" | tr -d '\r\n ' | base64 --decode > "$PROFILES_DIR/$PROV_UUID.mobileprovision"

      - name: Create Export Options
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$APP_ID</key>
                  <string>$PROV_UUID</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
              <key>manageAppVersionAndBuildNumber</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail
          
          echo "🛠️ Corrigindo permissões e aplicando patch de assinatura..."
          
          # 1. CORREÇÃO DE PERMISSÃO (Agora sem erro de digitação)
          chmod +x gradlew
          
          # 2. SUBSTITUIÇÃO PARA IDENTIDADE GENÉRICA
          find . -type f -name "project.pbxproj" -exec sed -i '' 's/iOS Distribution/iPhone Distribution/g' {} +
          find . -type f -name "project.pbxproj" -exec sed -i '' 's/Apple Distribution/iPhone Distribution/g' {} +

          # 3. LIMPEZA E PREPARAÇÃO
          ./gradlew clean
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa
          mkdir -p build/ios/logs

          # 4. ARCHIVE COM OVERRIDE
          echo "🚀 Executando xcodebuild archive..."
          xcodebuild clean archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -destination 'generic/platform=iOS' \
            -resultBundlePath build/ios/logs/PaxBuildLogs.xcresult \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROV_UUID" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -allowProvisioningOffline=YES \
            COMPILER_INDEX_STORE_ENABLE=NO | tee build/ios/logs/xcodebuild_raw_log.txt

          # 5. EXPORTAR IPA
          echo "📦 Gerando arquivo IPA final..."
          xcodebuild -exportArchive \
            -archivePath build/ios/xcarchive/app.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist "/Users/builder/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/logs/xcodebuild_raw_log.txt
      - build/ios/logs/PaxBuildLogs.xcresult