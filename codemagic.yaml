workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew
      - name: Initialize Keychain
        script: keychain initialize
      - name: Install Manual Certificate
        script: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"
      - name: Fetch Provisioning Profiles
        script: |
          app-store-connect fetch-signing-files "$APP_ID" --type IOS_APP_DEVELOPMENT --create
      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug
      - name: Build iOS App
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com