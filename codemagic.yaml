workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Final (Automated Signing)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        TEAM_ID: "264TWUW2L6"
        APP_ID: "br.com.paxrioverde.app"

    scripts:
      - name: Initialize Keychain
        script: |
          keychain initialize
          # Remove qualquer resquício de certificados antigos da máquina de build
          keychain set-default

      - name: Fetch Signing Files (App Store Connect)
        script: |
          # O comando abaixo agora força a criação e ignora certificados sem chave privada
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create \
            --generate-content
          
          # Instala o que foi gerado agora
          keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Build and Sign IPA
        script: |
          #!/usr/bin/env bash
          set -e -o pipefail

          echo "🧹 Limpando ambiente..."
          chmod +x gradlew
          ./gradlew clean
          
          mkdir -p build/ios/xcarchive
          mkdir -p build/ios/ipa

          echo "🚀 Gerando IPA..."
          # Usando o comando de build que força o uso do perfil baixado
          xcode-project build-ipa \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archive-path build/ios/xcarchive/app.xcarchive \
            -ipa-path build/ios/ipa/PaxRioVerde.ipa \
            -configuration Release

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive