workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew
      - name: Initialize Keychain & Fetch Signing
        script: |
          keychain initialize
          
          # Limpeza de perfis locais antigos para evitar conflitos
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/*
          
          # Comando para buscar e criar o certificado do zero
          # O --create garante que, se não houver um certificado com chave privada local, 
          # ele tentará gerar um novo no portal da Apple.
          app-store-connect fetch-signing-files "br.com.paxrioverde.app" \
            --type IOS_APP_DEVELOPMENT \
            --create
          
          keychain add-certificates
      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com