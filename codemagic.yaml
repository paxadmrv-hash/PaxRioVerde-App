workflows:
  ios-workflow:
    name: Pax Rio Verde iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_WORKSPACE: "iosApp/iosApp.xcworkspace"
        XCODE_SCHEME: "iosApp"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew
      - name: Initialize Keychain & Fetch Signing
        script: |
          keychain initialize
          
          # 1. Criar o arquivo da chave preservando as quebras de linha corretamente
          cat <<EOF > ./private_key.p8
          $APP_STORE_CONNECT_PRIVATE_KEY
          EOF

          # 2. Comando simplificado: Deixe o Codemagic usar as variáveis de ambiente automaticamente
          # Ele já sabe ler as variáveis APP_STORE_CONNECT_... se o nome estiver correto
          app-store-connect fetch-signing-files "br.com.paxrioverde.app" \
            --type IOS_APP_DEVELOPMENT \
            --create
          
          keychain add-certificates
      - name: Build Kotlin Shared Module
        script: ./gradlew :composeApp:assembleDebug
      - name: Build iOS App
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com