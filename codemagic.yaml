workflows:
  ios-workflow:
    name: Pax Rio Verde iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew

      - name: Initialize Keychain
        script: keychain initialize

      - name: Install Certificates
        script: |
          # Instalamos o .p12 que você gerou no OpenSSL
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"

      - name: Download Provisioning Profiles
        script: |
          # Em vez de fetch-signing-files, baixamos os perfis diretamente
          # Isso evita que o Codemagic tente gerenciar chaves privadas que ele não tem
          app-store-connect profiles list --bundle-id "$APP_ID" --filter-profile-type IOS_APP_STORE --limit 1

          # Comando para baixar o perfil para a pasta correta do Xcode
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          app-store-connect profiles download --bundle-id "$APP_ID" --filter-profile-type IOS_APP_STORE

      - name: Build iOS App (IPA)
        script: |
          # Agora o Xcode vai encontrar o Certificado (no keychain) e o Profile (na pasta acima)
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

      - name: Publish to App Store Connect
        script: |
          app-store-connect publish \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --app-id "$APP_ID" \
            --ipa build/ios/ipa/*.ipa

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - paxadmrv@gmail.com