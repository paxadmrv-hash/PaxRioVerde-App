workflows:
  ios-workflow:
    name: Pax Rio Verde iOS App Store
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - "Pax Rio Verde"
      vars:
        XCODE_PROJECT: "iosApp/iosApp.xcodeproj"
        XCODE_SCHEME: "iosApp"
        APP_ID: "br.com.paxrioverde.app"
    scripts:
      - name: Set gradlew permissions
        script: chmod +x gradlew

      - name: Initialize Keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$APP_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "$APP_STORE_CONNECT_PRIVATE_KEY" \
            --type IOS_APP_STORE \
            --create

      - name: Install certificates
        script: keychain add-certificates

      - name: Build and Release IPA
        script: |
          # O comando 'build-ipa' com as flags de App Store já prepara o envio
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration # Deixe assim para validar o arquivo
      email:
        recipients:
          - paxadmrv@gmail.com